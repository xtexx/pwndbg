name: Releases manual

on: workflow_dispatch

jobs:
  releases-linux-cross:
    strategy:
      fail-fast: false
      matrix:
        attribute: [
          # gdb
          pwndbg-gdb-cross-arm32-tarball,
          pwndbg-gdb-cross-riscv64-tarball,
          pwndbg-gdb-cross-s390x-tarball,
          pwndbg-gdb-cross-ppc64le-tarball,
          pwndbg-gdb-cross-x86_32-tarball,
          pwndbg-gdb-cross-loong64-tarball,

          # lldb
          pwndbg-lldb-cross-arm32-tarball,
          pwndbg-lldb-cross-riscv64-tarball,
          pwndbg-lldb-cross-s390x-tarball,
          pwndbg-lldb-cross-ppc64le-tarball,
          pwndbg-lldb-cross-x86_32-tarball,
          pwndbg-lldb-cross-loong64-tarball,
        ]
    runs-on: ubuntu-24.04-arm  # aarch64-linux
    timeout-minutes: 60
    permissions:
      contents: write  # IMPORTANT: this permission is mandatory for github-release upload
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # @v3
    - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15  # @v31.9.0
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: build ${{ matrix.attribute }}
      run: nix build '.#${{ matrix.attribute }}' --accept-flake-config -o dist-tarball

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # @v4
      with:
        name: ${{ matrix.os }}_${{ matrix.attribute }}
        retention-days: 90
        path: ./dist-tarball/*

    - name: release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # @v2.6.1
      with:
        files: |
          ./dist-tarball/*
        draft: true

  releases-linux:
    strategy:
      fail-fast: false
      matrix:
        os: [
          ubuntu-latest,  # x86_64-linux
          ubuntu-24.04-arm,  # aarch64-linux
        ]
        attribute: [
          pwndbg-gdb-portable-tarball,
          pwndbg-gdb-portable-rpm,
          pwndbg-gdb-portable-deb,
          pwndbg-gdb-portable-apk,
          pwndbg-gdb-portable-archlinux,
          pwndbg-lldb-portable-tarball,
          pwndbg-lldb-portable-rpm,
          pwndbg-lldb-portable-deb,
          pwndbg-lldb-portable-apk,
          pwndbg-lldb-portable-archlinux,
        ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write  # IMPORTANT: this permission is mandatory for github-release upload
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # @v3
    - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15  # @v31.9.0
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: build ${{ matrix.attribute }}
      run: nix build '.#${{ matrix.attribute }}' --accept-flake-config -o dist-tarball

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # @v4
      with:
        name: ${{ matrix.os }}_${{ matrix.attribute }}
        retention-days: 90
        path: ./dist-tarball/*

    - name: release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # @v2.6.1
      with:
        files: |
          ./dist-tarball/*
        draft: true

  releases-macos:
    strategy:
      fail-fast: false
      matrix:
        os: [
          macos-15-intel,  # x86_64-darwin
          macos-15,  # aarch64-darwin
        ]
        attribute: [
          pwndbg-lldb-portable-tarball,
          pwndbg-gdb-portable-tarball,
        ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: write  # IMPORTANT: this permission is mandatory for github-release upload
    steps:
    - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # @v3
    - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15  # @v31.9.0
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: build ${{ matrix.attribute }}
      run: nix build '.#${{ matrix.attribute }}' --accept-flake-config -o dist-tarball

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # @v4
      with:
        name: ${{ matrix.os }}_${{ matrix.attribute }}
        retention-days: 90
        path: ./dist-tarball/*

    - name: release
      uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # @v2.6.1
      with:
        files: |
          ./dist-tarball/*
        draft: true
