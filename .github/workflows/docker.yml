name: Test Docker

on:
  push:
    branches:
      - dev
    paths:
      - "**"
      - "!mkdocs.yml"
      - "!docs/**"
      - "!*.md"
  pull_request:
    paths:
      - "**"
      - "!mkdocs.yml"
      - "!docs/**"
      - "!*.md"

concurrency:
  # Pushes (dev): queue sequentially (prevent cache corruption)
  # PRs: cancel in-progress runs (only test latest)
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write

jobs:
  docker_x86-64:
    name: docker_x86-64 (${{ matrix.image }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: ubuntu22.04, dockerfile: Dockerfile, base: ubuntu:22.04 }
          - { image: ubuntu24.04, dockerfile: Dockerfile, base: ubuntu:24.04 }
          - { image: debian12, dockerfile: Dockerfile, base: debian:12 }
          - { image: archlinux, dockerfile: Dockerfile.arch, base: archlinux:latest }
          - { image: fedora41, dockerfile: Dockerfile.dnf, base: fedora:41 }
          - { image: fedora42, dockerfile: Dockerfile.dnf, base: fedora:42 }
          - { image: fedora43, dockerfile: Dockerfile.dnf, base: fedora:43 }

    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Dockerfile or setup changes
        id: build-check
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }}" | \
             grep -qE '^(Dockerfile.*|setup\.sh|setup-dev\.sh|scripts/common\.sh)$'; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || steps.build-check.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx ${{ matrix.image }} (cache-enabled)
        if: github.event_name == 'push' || steps.build-check.outputs.needed == 'true'
        run: |
          docker buildx build \
            --load \
            --cache-from type=registry,ref=ghcr.io/pwndbg/cache:${{ matrix.image }}-amd64 \
            ${{ github.event_name == 'push' && format('--cache-to type=registry,ref=ghcr.io/pwndbg/cache:{0}-amd64,mode=max', matrix.image) || '' }} \
            -f ${{ matrix.dockerfile }} \
            --build-arg image=${{ matrix.base }} \
            -t ghcr.io/pwndbg/pwndbg:${{ matrix.image }}-amd64 \
            -t ghcr.io/pwndbg/pwndbg:${{ matrix.image }} \
            .

      - name: Run Tests (GDB, DBG-GDB, DBG-LLDB in parallel) on ${{ matrix.image }}
        run: |
          docker compose run -T --rm --quiet-pull -v $(pwd):/pwndbg ${{ matrix.image }} bash -c '
            set -euo pipefail
            # Needed to prevent race conditions - prebuild binaries and create libpython symlink
            make -C /pwndbg/tests/binaries/host -j4 all
            gdb --batch

            set +e
            echo "Running generic tests on gdb, generic tests on lldb, and gdb-only tests on gdb at the same time. This should take ~6-9 minutes, results outputted at the end..."
            ./tests.sh -d gdb -g gdb > /tmp/gdb.log 2>&1 & gdb_pid=$!
            ./tests.sh -d gdb -g dbg > /tmp/dbg-gdb.log 2>&1 & dbg_gdb_pid=$!
            ./tests.sh -d lldb -g dbg > /tmp/dbg-lldb.log 2>&1 & dbg_lldb_pid=$!
            wait $gdb_pid; gdb_exit=$?
            wait $dbg_gdb_pid; dbg_gdb_exit=$?
            wait $dbg_lldb_pid; dbg_lldb_exit=$?
            set -e

            sed "s/^/[GDB] /" /tmp/gdb.log
            sed "s/^/[DBG-GDB] /" /tmp/dbg-gdb.log
            sed "s/^/[DBG-LLDB] /" /tmp/dbg-lldb.log

            echo ""
            echo "========================================"
            echo "       COMBINED TEST SUMMARY"
            echo "========================================"
            echo ""
            sed -n "/^\*\*\*/,\$p" /tmp/gdb.log | sed "s/^/[GDB] /"
            echo ""
            sed -n "/^\*\*\*/,\$p" /tmp/dbg-gdb.log | sed "s/^/[DBG-GDB] /"
            echo ""
            sed -n "/^\*\*\*/,\$p" /tmp/dbg-lldb.log | sed "s/^/[DBG-LLDB] /"

            exit $((gdb_exit | dbg_gdb_exit | dbg_lldb_exit))
          '

      - name: Push full image to registry
        if: github.event_name == 'push'
        run: docker push ghcr.io/pwndbg/pwndbg:${{ matrix.image }}-amd64

  docker_aarch64:
    name: docker_aarch64 (${{ matrix.image }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: ubuntu24.04, dockerfile: Dockerfile, base: ubuntu:24.04 }
          - { image: fedora41, dockerfile: Dockerfile.dnf, base: fedora:41 }
          - { image: fedora42, dockerfile: Dockerfile.dnf, base: fedora:42 }
          - { image: fedora43, dockerfile: Dockerfile.dnf, base: fedora:43 }

    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Dockerfile or setup changes
        id: build-check
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          if git diff --name-only "origin/${{ github.base_ref }}...${{ github.event.pull_request.head.sha }}" | \
             grep -qE '^(Dockerfile.*|setup\.sh|setup-dev\.sh|scripts/common\.sh)$'; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: github.event_name == 'push' || steps.build-check.outputs.needed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx ${{ matrix.image }} (cache-enabled)
        if: github.event_name == 'push' || steps.build-check.outputs.needed == 'true'
        run: |
          docker buildx build \
            --load \
            --cache-from type=registry,ref=ghcr.io/pwndbg/cache:${{ matrix.image }}-arm64 \
            ${{ github.event_name == 'push' && format('--cache-to type=registry,ref=ghcr.io/pwndbg/cache:{0}-arm64,mode=max', matrix.image) || '' }} \
            -f ${{ matrix.dockerfile }} \
            --build-arg image=${{ matrix.base }} \
            -t ghcr.io/pwndbg/pwndbg:${{ matrix.image }}-arm64 \
            -t ghcr.io/pwndbg/pwndbg:${{ matrix.image }} \
            .

      - name: Run Tests (Cross, DBG-GDB, DBG-LLDB in parallel) on ${{ matrix.image }}
        run: |
          docker compose run -T --rm --quiet-pull -v $(pwd):/pwndbg ${{ matrix.image }} bash -c '
            set -euo pipefail
            # Needed to prevent race conditions - prebuild binaries
            make -C /pwndbg/tests/binaries/host -j4 all

            set +e
            echo "Running generic tests on gdb, generic tests on lldb, and cross-arch tests at the same time. This should take ~6-9 minutes, results outputted at the end..."
            ./tests.sh -d gdb -g cross-arch-user > /tmp/cross.log 2>&1 & cross_pid=$!
            ./tests.sh -d gdb -g dbg > /tmp/dbg-gdb.log 2>&1 & dbg_gdb_pid=$!
            ./tests.sh -d lldb -g dbg > /tmp/dbg-lldb.log 2>&1 & dbg_lldb_pid=$!
            wait $cross_pid; cross_exit=$?
            wait $dbg_gdb_pid; dbg_gdb_exit=$?
            wait $dbg_lldb_pid; dbg_lldb_exit=$?
            set -e

            sed "s/^/[CROSS] /" /tmp/cross.log
            sed "s/^/[DBG-GDB] /" /tmp/dbg-gdb.log
            sed "s/^/[DBG-LLDB] /" /tmp/dbg-lldb.log

            echo ""
            echo "========================================"
            echo "       COMBINED TEST SUMMARY"
            echo "========================================"
            echo ""
            sed -n "/^\*\*\*/,\$p" /tmp/cross.log | sed "s/^/[CROSS] /"
            echo ""
            sed -n "/^\*\*\*/,\$p" /tmp/dbg-gdb.log | sed "s/^/[DBG-GDB] /"
            echo ""
            sed -n "/^\*\*\*/,\$p" /tmp/dbg-lldb.log | sed "s/^/[DBG-LLDB] /"

            exit $((cross_exit | dbg_gdb_exit | dbg_lldb_exit))
          '

      - name: Push full image to registry
        if: github.event_name == 'push'
        run: docker push ghcr.io/pwndbg/pwndbg:${{ matrix.image }}-arm64

  create_manifest:
    needs: [docker_x86-64, docker_aarch64]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          # Multi-arch images (amd64 + arm64)
          for image in ubuntu24.04 fedora41 fedora42 fedora43; do
            docker buildx imagetools create -t ghcr.io/pwndbg/pwndbg:$image \
              ghcr.io/pwndbg/pwndbg:$image-amd64 \
              ghcr.io/pwndbg/pwndbg:$image-arm64
          done

          # amd64-only images
          for image in ubuntu22.04 debian12 archlinux; do
            docker buildx imagetools create -t ghcr.io/pwndbg/pwndbg:$image \
              ghcr.io/pwndbg/pwndbg:$image-amd64
          done
