name: Check lock files
on:
  push:
    branches:
      - dev
  pull_request:

concurrency:
  # PRs: cancel in-progress runs (only test latest)
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Use dorny/paths-filter instead of on.paths so that skipped jobs report
  # as passed to branch protection, allowing docs-only PRs to merge.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@61f87a10cd2c304679af17bb73ef192addf33c1c # master (unreleased, for predicate-quantifier)
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!mkdocs.yml'
              - '!docs/**'
              - '!*.md'

  check_release_build-gdb:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
        os: [
            ubuntu-latest,  # x86_64-linux
            ubuntu-24.04-arm,  # aarch64-linux
            macos-15-intel,  # x86_64-darwin
            macos-15,  # aarch64-darwin
          ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: configure cache
        if: github.ref == 'refs/heads/dev'
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: pwndbg
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"

      - name: build pwndbg
        run: nix build '.#pwndbg' --accept-flake-config -o result

      - name: simple run pwndbg
        run: TERM=xterm-256color ./result/bin/pwndbg <<< 'exit'

      - name: build develop environment
        run: nix develop --accept-flake-config

  check_release_build-lldb:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
        os: [
            ubuntu-latest, # x86_64-linux
            ubuntu-24.04-arm, # aarch64-linux
            macos-15-intel, # x86_64-darwin
            macos-15, # aarch64-darwin
          ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: configure cache
        if: github.ref == 'refs/heads/dev'
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: pwndbg
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"

      - name: build pwndbg
        run: nix build '.#pwndbg-lldb' --accept-flake-config -o result

      - name: simple run pwndbg
        run: TERM=xterm-256color ./result/bin/pwndbg-lldb <<< 'exit'

      - name: build develop environment
        run: nix develop --accept-flake-config

  lock_flake:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: check flake.lock
        run: nix flake lock --no-update-lock-file

  lock_uv:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: install uv
        run: nix profile install --inputs-from . nixpkgs#uv

      - name: check uv.lock
        run: uv lock --locked
