name: Check lock files
on:
  push:
    branches:
      - dev
    paths:
      - "**"
      - "!mkdocs.yml"
      - "!docs/**"
      - "!*.md"
  pull_request:
    paths:
      - "**"
      - "!mkdocs.yml"
      - "!docs/**"
      - "!*.md"

jobs:
  check_release_build-gdb:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
        os: [
            ubuntu-latest,  # x86_64-linux
            ubuntu-24.04-arm,  # aarch64-linux
            macos-15-intel,  # x86_64-darwin
            macos-15,  # aarch64-darwin
          ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: configure cache
        if: github.ref == 'refs/heads/dev'
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: pwndbg
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"

      - name: build pwndbg
        run: nix build '.#pwndbg' --accept-flake-config -o result

      - name: simple run pwndbg
        run: TERM=xterm-256color ./result/bin/pwndbg <<< 'exit'

      - name: build develop environment
        run: nix develop --accept-flake-config

  check_release_build-lldb:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners/using-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
        os: [
            ubuntu-latest, # x86_64-linux
            ubuntu-24.04-arm, # aarch64-linux
            macos-15-intel, # x86_64-darwin
            macos-15, # aarch64-darwin
          ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: configure cache
        if: github.ref == 'refs/heads/dev'
        uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: pwndbg
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
          signingKey: "${{ secrets.CACHIX_SIGNING_KEY }}"

      - name: build pwndbg
        run: nix build '.#pwndbg-lldb' --accept-flake-config -o result

      - name: simple run pwndbg
        run: TERM=xterm-256color ./result/bin/pwndbg-lldb <<< 'exit'

      - name: build develop environment
        run: nix develop --accept-flake-config

  lock_flake:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: check flake.lock
        run: nix flake lock --no-update-lock-file

  lock_uv:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # @v3
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # @v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: install uv
        run: nix profile install --inputs-from . nixpkgs#uv

      - name: check uv.lock
        run: uv lock --locked
