version: 2

updates:
  # Python dependencies via UV
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
      timezone: "UTC"

    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 1
      semver-patch-days: 0

    open-pull-requests-limit: 5

    groups:
      prod-patch:
        patterns: ["*"]
        dependency-type: "production"
        update-types: ["version-update:semver-patch"]

      prod-minor:
        patterns: ["*"]
        dependency-type: "production"
        update-types: ["version-update:semver-minor"]

      prod-major:
        patterns: ["*"]
        dependency-type: "production"
        update-types: ["version-update:semver-major"]

      dev-updates:
        patterns: ["*"]
        dependency-type: "development"

    ignore:
      # Pinned for CI compatibility (comment in pyproject.toml)
      - dependency-name: "pytest"
      # Pinned for linting consistency
      - dependency-name: "ruff"
      # Pinned for exploit pattern compatibility
      - dependency-name: "ropgadget"
      # Git dependency handled separately
      - dependency-name: "pt"

    labels:
      - "dependencies"
      - "python"

    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:00"
      timezone: "UTC"

    groups:
      actions:
        patterns: ["*"]

    labels:
      - "dependencies"
      - "ci"

    commit-message:
      prefix: "ci"
      include: "scope"
